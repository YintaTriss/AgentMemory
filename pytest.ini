[pytest]
# pytest 配置

# 测试目录
testpaths = tests

# 异步模式
asyncio_mode = auto

# Python 路径
pythonpath = . src

# 输出选项
addopts = 
    -v
    --tb=short
    --strict-markers
    --disable-warnings

# 标记定义
markers =
    # 慢速测试
    slow: 慢速测试（超过 5 秒）
    
    # 集成测试
    integration: 集成测试
    
    # 性能测试
    performance: 性能基准测试
    
    # 安全测试
    security: 安全相关测试
    
    # 兼容性测试
    compatibility: 框架兼容性测试
    
    # API 测试（需要外部 API Key）
    api: 需要外部 API 的测试
    
    # 单元测试
    unit: 单元测试

# 覆盖率配置
[coverage:run]
source = src
omit = 
    */tests/*
    */test_*.py
    */__pycache__/*

[coverage:report]
precision = 2
show_missing = True
skip_covered = False

# 日志配置
log_cli = false
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)8s] %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S
