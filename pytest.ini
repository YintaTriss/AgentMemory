[pytest]
# pytest 配置

# 测试目录
testpaths = tests

# 2026-07-15: 忽略老 flat 模块测试(DEPRECATED-MARKER 老代码)
# 老 flat 模块(src/L2_graph_store / L4_file_persist / decay_engine)已
# 被 agent_memory.* 新模块取代,但字节还在(向后兼容 shim)。
# 这些老测试在 6-10h 老 API 迁移完成前不能删,但应在新基础设施下重写。
# 详见 CHANGELOG-2026-07-15.md "未做项 #4"。
ignore =
    tests/unit/test_L2_graph_store.py
    tests/unit/test_L4_file_persist.py
    tests/unit/test_decay_engine.py

# 异步模式
asyncio_mode = auto

# Python 路径
pythonpath = . src

# 输出选项
addopts = 
    -v
    --tb=short
    --strict-markers
    --disable-warnings

# 标记定义
markers =
    # 慢速测试
    slow: 慢速测试（超过 5 秒）
    
    # 集成测试
    integration: 集成测试
    
    # 性能测试
    performance: 性能基准测试
    benchmark: 性能基准测试（benchmarks/ 目录）
    perf: 性能基准测试（benchmarks/ 目录）
    
    # 安全测试
    security: 安全相关测试
    
    # 兼容性测试
    compatibility: 框架兼容性测试
    
    # API 测试（需要外部 API Key）
    api: 需要外部 API 的测试
    
    # 单元测试
    unit: 单元测试

# 覆盖率配置
[coverage:run]
source = src
omit = 
    */tests/*
    */test_*.py
    */__pycache__/*

[coverage:report]
precision = 2
show_missing = True
skip_covered = False

# 日志配置
log_cli = false
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)8s] %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S
